<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="wrap-1">
    </div>
    <main>
        <div class="container">
            <section class="nav-section">
                <a class="inactive" href="index.html">Home</a> &nbsp; / &nbsp;
                <a href="">Contact</a>
            </section>
            <div class="row contact-info">
                <div class="col-3 col-m-12">
                    <h3> <i class="fa-solid fa-phone"></i> &nbsp; &nbsp;Call To Us</h3>
                    <p>We are available 24/7, 7 days a week.</p>
                    <p>Phone: +8804980030485</p>
                    <hr>
                    <br>
                    <h3> <i class="fa-solid fa-envelope"></i> &nbsp; &nbsp; Write To Us</h3>
                    <p>Fill out form and we will contact you within 24 hours.</p>
                    <p>Emails: custmer@exclusive.com</p>
                    <p>Emails: support@exclusive.com</p>
                </div>
                <div class="col-8 col-m-12 align-items contact">
                    <form action="/index.html" method="post" >
                        <div class="flex">
                            <input type="text" name="name" placeholder="Your Name*" required>
                            <input type="email" name="email" placeholder="Your Email*" required>
                            <input type="text" name="phone" placeholder="Your Phone*" required>
                        </div>
                        <textarea name="msg" placeholder="Your Message" cols="60" rows="10"></textarea>
                        <br>
                        <a href="index.html" class="cont-button text-center"> Send Message</a>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer>
    </footer>

    <script src="js/script.js"></script>

    
</body>
</html>
