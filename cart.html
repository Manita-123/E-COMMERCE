<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="wrap-1">
    </div>

    <main>
        <div class="container ">
            <section class="nav-section">
                <a class="inactive" href="index.html">Home</a> &nbsp;/ &nbsp;
                <a href="">Cart</a>
            </section>
            <div class="cart-desc ">
                <div class="card flex justify-space-bet align-center">
                    <p>Product</p>
                    <p class=" shift shift-1">Price</p>
                    <p class=" shift shift-2">Quantity</p>
                    <p>Subtotal</p>
                </div>
                <div class="card flex justify-space-bet align-center">
                    <figure class="flex">
                        <img src="img/miniTV.png" alt="miniTV" width="50" height="39"> &nbsp; &nbsp;
                        <p>LCD Monitor</p>
                    </figure>
                    <p>&dollar;650</p>
                    <input type="number" value="05" placeholder="0">
                    <p>&dollar;650</p>
                </div>
                <div class="card flex justify-space-bet align-center">
                    <figure class="flex">
                        <img src="img/miniGamepad.png" alt="miniGamepad" width="49" height="43"> &nbsp; &nbsp;
                        <p>Hi Gamepad</p>
                    </figure>
                    <p>&dollar;550</p>
                    <input type="number" value="05" placeholder="0">
                    <p>&dollar;1100</p>
                </div>
            </div>
            <div class="flex  justify-space-bet">
                <button type="button" title="Shop" class="view-all-products btn-black">Return To Shop</button>
                <button type="button" title="Cart" class="view-all-products btn-black">Update Cart</button>
            </div>
            <div class="row ">
                <div class="col-6 col-m-12">
                    <div class="flex cart-detail ">
                        <input type="text" placeholder="Coupon Code">
                        <button type="button" title="Coupon" class="view-all btn-red">Apply Coupon</button>
                    </div>
                </div>
                <div class="col-6 col-m-12 cart-about">
                        <h4>Card Total</h4>
                        <div class="flex justify-space-bet">
                            <p>SubTotal:</p>
                            <p>&dollar; 1750</p>
                        </div>
                        <hr>
                        <div class="flex justify-space-bet">
                            <p>shipping:</p>
                            <p>Free</p>
                        </div>
                        <hr>
                        <div class="flex justify-space-bet">
                            <p>Total:</p>
                            <p>&dollar;1750</p>
                        </div>
                        <button type="button" title="Cart" class="view-all-products btn-red">Process To
                            Checkout</button>
                    
                </div>

            </div>
        </div>

    </main>

    <footer>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
