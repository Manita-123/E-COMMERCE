<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="wrap-1">
        <div class="topnav">
        </div>
        <header>
            <div class="container">
                <div class="row jusify-right">
                    <div class="col-3">
                        <h1><a href="">Exclusive</a></h1>
                    </div>
                    <div class="col-9">
                        <div class="flex justify-space-bet align-center">
                            <nav>
                                <ul class="flex nav-menu">
                                    <li><a href="index.html">Home</a></li>
                                    <li><a href="about.html">About</a></li>
                                    <li><a href="contact.html">Contact</a></li>
                                    <li><a href="Signin.html">Sign Up</a></li>
                                </ul>
                                <select id="mobileMenu" title="mobileMenu">
                                    <option selected disabled>Menu</option>
                                </select>
                            </nav>
                            <div class="flex align-center">
                                <form action="/search" id="searchForm">
                                    <input type="text" name="search" placeholder="What are you looking for?"
                                        id="searchInput" required>
                                    <a href="index.html" title="search"><span class="fa fa-magnifying-glass"
                                            aria-hidden="true"></span></a>
                                </form>
                                <a href="wishlist.html" class="wishlist" title="wishlist"><span
                                        class="fa-regular fa-heart" aria-hidden="true"></a>
                                <button type="button"  class="cart text-center" title="cart"><span class="fa-solid fa-cart-shopping"
                                        aria-hidden="true"></span></button>
                                <div class="accont-wrapper">
                                    <button type="button" class="account " title="account"><span
                                            class="fa-regular fa-user"></span></button>
                                    <div id="accountMenu" title="accountMenu">
                                        <ul class="flex fdir-col ">
                                            <li>
                                                <a href="account.html" data-value="account">
                                                    <i class="fa-regular fa-user"></i> Manage My Account
                                                </a>
                                            </li>
                                            <li>
                                                <a href="cart.html" data-value="order ">
                                                    <i class="fa-solid fa-bag-shopping"></i> My Order
                                                </a>
                                            </li>
                                            <li>
                                                <a href="#" data-value="cancel">
                                                    <i class="fa-regular fa-circle-xmark"></i> My Cancellation
                                                </a>
                                            </li>
                                            <li>
                                                <a href="#" data-value="reviews">
                                                    <i class="fa-regular fa-star"></i> My Reviews
                                                </a>
                                            </li>
                                            <li>
                                                <a href="#" data-value="logout">
                                                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                                                </a>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <main>
        <div class="container ">
            <section class="nav-section">
                <a class="inactive" href="index.html">Home</a> &nbsp;/ &nbsp;
                <a href="">Cart</a>
            </section>
            <div class="cart-desc ">
                <div class="card flex justify-space-bet align-center">
                    <p>Product</p>
                    <p class=" shift shift-1">Price</p>
                    <p class=" shift shift-2">Quantity</p>
                    <p>Subtotal</p>
                </div>
                <div class="card flex justify-space-bet align-center">
                    <figure class="flex">
                        <img src="img/miniTV.png" alt="miniTV" width="50" height="39"> &nbsp; &nbsp;
                        <p>LCD Monitor</p>
                    </figure>
                    <p>&dollar;650</p>
                    <input type="number" value="05" placeholder="0">
                    <p>&dollar;650</p>
                </div>
                <div class="card flex justify-space-bet align-center">
                    <figure class="flex">
                        <img src="img/miniGamepad.png" alt="miniGamepad" width="49" height="43"> &nbsp; &nbsp;
                        <p>Hi Gamepad</p>
                    </figure>
                    <p>&dollar;550</p>
                    <input type="number" value="05" placeholder="0">
                    <p>&dollar;1100</p>
                </div>
            </div>
            <div class="flex  justify-space-bet">
                <button type="button" title="Shop" class="view-all-products btn-black">Return To Shop</button>
                <button type="button" title="Cart" class="view-all-products btn-black">Update Cart</button>
            </div>
            <div class="row ">
                <div class="col-6 col-m-12">
                    <div class="flex cart-detail ">
                        <input type="text" placeholder="Coupon Code">
                        <button type="button" title="Coupon" class="view-all btn-red">Apply Coupon</button>
                    </div>
                </div>
                <div class="col-6 col-m-12 cart-about">
                    <h4>Card Total</h4>
                    <div class="flex justify-space-bet">
                        <p>SubTotal:</p>
                        <p>&dollar; 1750</p>
                    </div>
                    <hr>
                    <div class="flex justify-space-bet">
                        <p>shipping:</p>
                        <p>Free</p>
                    </div>
                    <hr>
                    <div class="flex justify-space-bet">
                        <p>Total:</p>
                        <p>&dollar;1750</p>
                    </div>
                    <button type="button" title="Cart" class="view-all-products btn-red">Process To
                        Checkout</button>

                </div>

            </div>
        </div>

    </main>

    <footer>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
