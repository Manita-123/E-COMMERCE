<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>

<body>
    <div class="wrap-1">
    </div>

    <div class="wrap-2">
        <div class="container">
            <section class="nav-section">
                <a class="inactive" href="index.html">Home</a> &nbsp; / &nbsp;
                <a href="account.html">My Account</a>
            </section>

            <div class="row Account">
                <div class="col-4">
                    <aside>
                        <p>Manage My Account</p>
                        <ul class="flex">
                            <li><a class="start" href="profile.html">My Profile</a></li>
                            <li><a href="#">Address Book</a></li>
                            <li><a href="#">My Payment Options</a></li>
                        </ul>
                        <p>My Orders</p>
                        <ul class="flex">
                            <li><a href="#">My Returns</a></li>
                            <li><a href="#">My Cncellations</a></li>
                        </ul>
                        <p>My Wishlist</p>
                    </aside>
                </div>
                <div class="col-8 col-m-12">
                    <form>
                        <h3>Edit your profile</h3>
                        <div class="flex ">
                            <div class="  input-box flex">
                                <label for="fname">First Name</label>
                                <input type="text" id="fname" placeholder="Md" required>
                            </div>
                            <div class="  input-box flex">
                                <label for="lname">Last Name</label>
                                <input type="text" id="lname" placeholder="Rimel" required>
                            </div>
                        </div>
                        <div class="flex">
                            <div class="  input-box flex">
                                <label for="email">Email</label>
                                <input type="email" id="email" placeholder="rimel@gmail.com" required>
                            </div>
                            <div class="input-box flex">
                                <label for="add">Address</label>
                                <input type="text" id="add" placeholder="New Delhi , India" required>
                            </div>
                        </div>
                        <div class=" pwds">
                            <label for="pass">Password Changes</label>
                            <br>
                            <br>
                            <input type="password" id="pwd" placeholder="Current Password" required>
                            <input  type="password" id="psw" placeholder="New Password" required>
                            <input type="password" id="pass" placeholder="Confirm New Password" required>
                        </div>
                    </form>
                    <div class="flex justify-right align-center">
                        <div class="flex cancel-btn"><a  href="#">Canel</a></div>
                    <div class="flex justify-space-even"><a href="" class="view-all-products btn-red ">Save Changes</a>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <footer>
    </footer>

    <script src="js/script.js"></script>
    
</body>

</html>
